spring:
  datasource:
    url: jdbc:h2:mem:parver;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console

parver:
  security:
    jwt:
      secret: dev-secret-key-that-is-at-least-32-bytes-long-for-hmac-sha256
